# Channels processed by `feed-filter --config configs/politics.yaml`, run on a
# schedule by scripts/update_and_publish.sh (via launchd), which loops over
# every file in configs/ and commits the regenerated docs/*.xml files back to
# this (public) repo.
#
# `url` is used exactly as given - point it at a specific tab (/videos,
# /streams, /shorts) and only that tab's content is considered, since videos
# are listed directly from yt-dlp rather than YouTube's channel-wide RSS feed.
#
# `output` paths are relative to the repo root. Point Feedly (or any other
# reader) at the raw file URL:
#   https://raw.githubusercontent.com/AnotherGuitar/feed-filter/main/<output>
#
# `name` is suffixed with which tab/feed of the channel this is (-main,
# -streams, -shorts, etc), so the same channel can be followed multiple ways
# without name/output collisions.
#
# `recent_count` (default 20) is how many of the channel's most recent videos
# to check.
#
# `start_at` (optional) links to a timestamp partway into every video instead
# of the start, to skip past an intro/ad - accepts "M:SS"/"H:MM:SS" or a
# plain number of seconds. Only affects the link; duration/live_status checks
# still use the video's actual full length.
#
# `exclude_title_contains` (optional) is a list of substrings (case-
# insensitive) - any video whose title contains one is skipped entirely,
# e.g. a recurring segment you don't want.
#
# Streams still live, not yet started, or still being processed after ending
# are always skipped, regardless of min_minutes, since their duration isn't
# final yet. Only fully finished streams pass through to the duration check.
channels:
  - name: declineandfall-streams
    url: "https://www.youtube.com/@DeclineAndFall-d5k/streams"
    min_minutes: 5
    recent_count: 50
    output: docs/declineandfall-streams.xml
    self_url: "https://raw.githubusercontent.com/AnotherGuitar/feed-filter/main/docs/declineandfall-streams.xml"

  - name: thegrayzone-main
    url: "https://www.youtube.com/@thegrayzone7996/videos"
    min_minutes: 5
    recent_count: 50
    output: docs/thegrayzone-main.xml
    self_url: "https://raw.githubusercontent.com/AnotherGuitar/feed-filter/main/docs/thegrayzone-main.xml"

  - name: judgingfreedom-streams
    url: "https://www.youtube.com/@judgingfreedom/streams"
    min_minutes: 5
    recent_count: 50
    start_at: "1:08"
    output: docs/judgingfreedom-streams.xml
    self_url: "https://raw.githubusercontent.com/AnotherGuitar/feed-filter/main/docs/judgingfreedom-streams.xml"

  - name: lunaoi-main
    url: "https://www.youtube.com/@Lunaoi/videos"
    min_minutes: 5
    recent_count: 50
    output: docs/lunaoi-main.xml
    self_url: "https://raw.githubusercontent.com/AnotherGuitar/feed-filter/main/docs/lunaoi-main.xml"

  - name: syrianaanalysis-main
    url: "https://www.youtube.com/@SyrianaAnalysis/videos"
    min_minutes: 5
    recent_count: 50
    output: docs/syrianaanalysis-main.xml
    self_url: "https://raw.githubusercontent.com/AnotherGuitar/feed-filter/main/docs/syrianaanalysis-main.xml"

  - name: syrianaanalysis-streams
    url: "https://www.youtube.com/@SyrianaAnalysis/streams"
    min_minutes: 5
    recent_count: 50
    output: docs/syrianaanalysis-streams.xml
    self_url: "https://raw.githubusercontent.com/AnotherGuitar/feed-filter/main/docs/syrianaanalysis-streams.xml"

# Merges every channel in this file into a single feed, newest first, so you
# only need to give Feedly (or add more politics channels) one URL.
combined_output: docs/combined-politics2.xml
combined_self_url: "https://raw.githubusercontent.com/AnotherGuitar/feed-filter/main/docs/combined-politics2.xml"
combined_title: "Combined - Politics"
