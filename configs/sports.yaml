channels:
  - name: chinadriven-main
    url: "https://www.youtube.com/@ChinaDriven/videos"
    min_minutes: 5
    recent_count: 50
    output: docs/chinadriven-main.xml
    self_url: "https://raw.githubusercontent.com/AnotherGuitar/feed-filter/main/docs/chinadriven-main.xml"

  - name: foulterritory-main
    url: "https://www.youtube.com/@foulterritoryshow/videos"
    min_minutes: 5
    recent_count: 50
    output: docs/foulterritory-main.xml
    self_url: "https://raw.githubusercontent.com/AnotherGuitar/feed-filter/main/docs/foulterritory-main.xml"

  - name: nflonnbc-streams
    url: "https://www.youtube.com/@NFLonNBC/streams"
    min_minutes: 5
    recent_count: 50
    exclude_title_contains:
      - "rotoworld football show"
    output: docs/nflonnbc-streams.xml
    self_url: "https://raw.githubusercontent.com/AnotherGuitar/feed-filter/main/docs/nflonnbc-streams.xml"

  - name: pablotorrefindsout-main
    url: "https://www.youtube.com/@PabloTorreFindsOut/videos"
    min_minutes: 5
    recent_count: 50
    output: docs/pablotorrefindsout-main.xml
    self_url: "https://raw.githubusercontent.com/AnotherGuitar/feed-filter/main/docs/pablotorrefindsout-main.xml"

