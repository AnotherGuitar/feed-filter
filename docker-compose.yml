services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feed-filter
    volumes:
      # Mount source code for development (hot reload)
      - ./src:/app/src
    env_file:
      - path: .env
        required: false
    ports:
      # Expose ports as needed for your application
      # Example: "8000:8000" for web services
      - "8000:8000"
    # Override default command for development
    # command: python -m feed_filter.main

    # Uncomment to keep container running for debugging
    # stdin_open: true
    # tty: true

